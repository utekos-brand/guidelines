      - generic [ref=e77]:
        - article [ref=e80]:
          - generic [ref=e81]:
            - text: Fundamenter
            - status [ref=e82]
          - heading "Lenke til seksjonen" [level=1] [ref=e83]:
            - link "Lenke til seksjonen" [ref=e84] [cursor=pointer]:
              - /url: "#farger"
              - text: Farger
          - paragraph [ref=e85]: Paletten er bygget opp av varme og kalde toner med ulik styrke og klarhet, og gir et stort spenn i uttrykket – fra optimistisk og engasjerende til bærekraftig og ansvarlig.
          - paragraph [ref=e86]: Alle farger er definert med spesifikke verdier for både trykte og digitale flater. For å sikre riktig gjengivelse skal kun de oppgitte verdiene brukes.
          - paragraph [ref=e87]: For digitale flater som web og app finnes et utvidet spekter av nyanser for hver farge, samt et utvalg rødtoner. Disse er kun definert i RGB og gir større fleksibilitet i digitale kanaler.
          - separator [ref=e88]
          - list [ref=e89]:
            - listitem [ref=e90]:
              - link "Bakgrunnsfarge" [ref=e91] [cursor=pointer]:
                - /url: https://brand.utekos.no/(brand)/farger#background-color
            - listitem [ref=e92]:
              - link "Komponentfarge" [ref=e93] [cursor=pointer]:
