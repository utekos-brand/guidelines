          - paragraph [ref=e100]:
            - link "Gå til fargetokens" [ref=e101] [cursor=pointer]:
              - /url: https://brand.utekos.no/(brand)/farger#design-tokens
          - heading "Lenke til seksjonen" [level=2] [ref=e102]:
            - link "Lenke til seksjonen" [ref=e103] [cursor=pointer]:
              - /url: "#bakgrunnsfarge"
              - text: Bakgrunnsfarge
          - paragraph [ref=e104]: Spor bruker to ulike bakgrunnsfarger som skal benyttes både i app og på web. Bakgrunnsfarge brukes til å gruppere komponenter, skille ulike typer innhold eller løfte noe frem fra bakgrunnen for å fremheve noe som er klikkbart. Det er viktig at vi er konsekvente i bruken av bakgrunnsfarger. Se helheten i en flyt og hvordan innholdet henger sammen. Det er viktig at like elementer får samme design, og dette gjelder også bakgrunnsfarge.
          - heading "Lenke til seksjonen" [level=2] [ref=e105]:
            - link "Lenke til seksjonen" [ref=e106] [cursor=pointer]:
              - /url: "#komponentfarge"
              - text: Komponentfarge
          - paragraph [ref=e107]: Komponenter gir større rom for bruk av farger, men det skal alltid være fokus på lesbarhet og kontrast. Enkelte komponenter bruker for eksempel ulike bakgrunnsfarger for å signalisere forskjell i viktighet. Du kan også bruke spesifikke farger for å fremheve et element, eller for å skjule det.
          - paragraph [ref=e108]: Ved bruk av andre farger enn hvit og grå, er det viktig å vurdere bruken nøye. Er dette signalfarger som brukes til varsler? Vil det konkurrere med navigasjon eller brukerens valg?
          - heading "Lenke til seksjonen" [level=2] [ref=e109]:
            - link "Lenke til seksjonen" [ref=e110] [cursor=pointer]:
              - /url: "#farge-og-ikoner"
              - text: Farge og ikoner
          - paragraph [ref=e111]: Ikoner leveres som standard i «mørk grå», men kan brukes i andre farger i spesielle tilfeller.
          - list [ref=e112]:
            - listitem [ref=e113]: På mørke bakgrunner bør en lys farge brukes, og helst den «fylte» versjonen av ikonet. Her er det naturlig å bruke hvit dersom du ønsker høyest kontrast.
            - listitem [ref=e114]: Fremhevede ikoner kan bruke en annen farge enn mørk grå dersom det bidrar til å skille dem fra resten.
            - listitem [ref=e115]: Noen komponenter trenger ikoner i andre farger enn standard. Dette er for å tilpasse seg det underliggende designet. Choice Chips bruker to nyanser av grønn for å gi et mykere uttrykk.
            - listitem [ref=e116]: Ikoner som tilhører et produkt kan brukes i produktets farge.
          - heading "Lenke til seksjonen" [level=2] [ref=e117]:
            - link "Lenke til seksjonen" [ref=e118] [cursor=pointer]:
              - /url: "#farge-og-tilstander"
              - text: Farge og tilstander
          - paragraph [ref=e119]: Spor-komponenter har en systematisk bruk av design-tokens for å vise interaktive tilstander. Vi ønsker at brukeren skal kunne gjenkjenne lik interaksjon uavhengig av om de er på web eller i app, eller om de trykker på en knapp eller legger til et dokument.
          - paragraph [ref=e120]: For eksempel bruker de fleste knapper en mørkere fargeverdi ved hover, før de får en lysere fargeverdi når du trykker ned knappen. Unntaket er Legg til-knappen, som ofte supplerer andre typer knapper og kan brukes der du ønsker flere knapper samlet med lik vekt. Deaktivert knappetilstand vil være lik på tvers av alle typer knapper slik at brukeren kan gjenkjenne den.
          - heading "Lenke til seksjonen" [level=2] [ref=e121]:
            - link "Lenke til seksjonen" [ref=e122] [cursor=pointer]:
              - /url: "#retningslinjer"
              - text: Retningslinjer
          - heading "Lenke til seksjonen" [level=3] [ref=e123]:
            - link "Lenke til seksjonen" [ref=e124] [cursor=pointer]:
              - /url: "#ikke-bruk-egendefinerte-farger"
              - text: "Ikke bruk egendefinerte farger:"
          - paragraph [ref=e125]: Du skal ikke bruke andre farger enn de som allerede finnes i en komponent, eller som er avledet fra design-tokens og basert på eksisterende design.
          - heading "Lenke til seksjonen" [level=3] [ref=e126]:
            - link "Lenke til seksjonen" [ref=e127] [cursor=pointer]:
              - /url: "#unngå-lav-fargekontrast"
              - text: "Unngå lav fargekontrast:"
          - paragraph [ref=e128]: Tekst, ikoner og komponenter må følge WCAG-kravene for minimum kontrast. Dette kan kontrolleres gjennom plugins eller nettbaserte verktøy.
          - heading "Lenke til seksjonen" [level=3] [ref=e129]:
            - link "Lenke til seksjonen" [ref=e130] [cursor=pointer]:
              - /url: "#ikke-bruk-kun-farger"
              - text: "Ikke bruk kun farger:"
          - paragraph [ref=e131]: Det er ikke tilstrekkelig å kun bruke farge alene for å gi tilbakemelding til brukeren. Det skal alltid være en etikett eller et ikon som gir fargen riktig kontekst.
