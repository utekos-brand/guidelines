            - heading "Merkevaren Vy" [level=1] [ref=e99]
            - generic [ref=e100]:
              - heading "Vi er i bevegelse" [level=2] [ref=e104]
              - generic [ref=e105]:
                - paragraph [ref=e106]: Hver dag sørger vi for at hundretusener av mennesker kan reise så miljøvennlig og enkelt som mulig. Det er kjernen i det vi gjør, og grunnen til at Vy finnes.
                - paragraph [ref=e107]: Samtidig endrer verden seg raskt. Folk bor tettere, køutfordringer og utslipp øker, og ny teknologi og digitalisering skaper nye muligheter. Konkurransen er tøff, og Vy har fra første dag vært et konkurranseutsatt selskap som kjemper om kundenes tillit hver eneste dag.
                - paragraph [ref=e108]: "Til deg som skal bruke denne designmanualen: Følg retningslinjene nøye, men våg å utfordre oss til å tenke nytt for å utvikle enda bedre løsninger. Markedsføring og merkevarebygging er avgjørende for at Vy skal lykkes med å få enda flere til å reise miljøvennlig."
                - paragraph [ref=e109]:
                  - strong [ref=e110]: Dagfrid Hestnes
                  - text: Leder design og profil, Marked
                - link "dagfrid.hestnes@vy.no" [ref=e112] [cursor=pointer]:
                  - /url: mailto:dagfrid.hestnes@vy.no
                  - img [ref=e113]
                  - text: dagfrid.hestnes@vy.no
                  - img [ref=e116]
            - generic [ref=e119]:
              - img "Voksen med barn i fanget om bord på toget" [ref=e122]
              - generic [ref=e124]:
                - paragraph
            - generic [ref=e125]:
              - heading "Navnet ser fremover" [level=2] [ref=e129]
              - generic [ref=e130]:
                - paragraph [ref=e131]: Skal vi som samfunn gjøre miljø og reise til to ord som hører sammen, må vi tenke nytt og annerledes. Vi må ha vyer. Navnet Vy er nordisk og betyr utsyn, oversyn, utsikt eller bilde av.
                - paragraph [ref=e132]: Å ha vyer betyr for oss å ha som mål å tilby den beste reisen. Vi vet at for våre kunder så er høy kvalitet og punktlighet på hver eneste daglige tog- og bussreise alltid første prioritet.
                - paragraph [ref=e133]: Navnet Vy inneholder et løfte om at vi skal gjøre alt vi kan for at kundenes reise med oss skal bli enda litt bedre.
            - generic [ref=e135]:
              - img "Utsikt over fjellandskap fra Bergensbanen" [ref=e138]
              - generic [ref=e140]:
                - paragraph
            - generic [ref=e141]:
              - heading "Designet viser bevegelse" [level=2] [ref=e145]
              - generic [ref=e146]:
                - paragraph [ref=e147]: Bevegelse er kjernen i virksomheten til Vy. Bevegelse er både historien og fremtiden. Ny teknologi gjør det mulig å tilby stadig mer fleksible løsninger, slik at flere kan reise sømløst fra dør til dør.
                - paragraph [ref=e148]: Bevegelse er også kjernen i designkonseptet til Vy. Det kommer til syne i logoen, som med sine uavbrutte linjer viser at Vy vil tilby en mest mulig sømløs reiseopplevelse. Og i de grønne hovedfargene, som viser at Vy beveger seg mot en mer bærekraftig fremtid.
                - paragraph [ref=e149]: "Konseptet bevegelse skal også vise at Vy tilbyr mer enn transport fra A til B. Merkevaren Vy skal fortelle historier som skaper følelser og beveger. Om hjemkomstklemmer og farvelkyss, naturopplevelser og urbane gleder. Og ikke minst: Om møtene mellom mennesker på reise gjennom livet."
                - paragraph [ref=e150]: Bevegelse er også beskrivende for selskapet og arbeidsplassen Vy. Konseptet skal bidra til å lage intern kommunikasjon som øker stoltheten over at vi er ett lag som arbeider og beveger oss mot felles og viktige mål.
